version: "3.8"

services:

  db:
    image: mysql:5.7
    container_name: wordpress_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_net

  wordpress:
    image: wordpress:php8.2-apache
    container_name: wordpress_app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_pass
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./themes:/var/www/html/wp-content/themes
    networks:
      - wp_net

  git-updater:
    image: alpine/git
    container_name: git_updater
    restart: "no"
    volumes:
      - ./themes:/repo
    entrypoint: >
      sh -c "
      echo '--- Iniciando actualización de temas desde Git ---' &&
      # SUSTITUYE LA URL por tu repositorio real de GitHub
      REPO_URL='https://github.com/TU_USUARIO/TU_REPOSITORIO.git' &&
      
      if [ ! -d '/repo/.git' ]; then
        echo 'Clonando repositorio...' &&
        git clone $$REPO_URL /repo;
      else
        echo 'Actualizando repositorio existente...' &&
        cd /repo && git pull;
      fi &&
      
      echo 'Ajustando permisos para WordPress...' &&
      # Esto permite que el contenedor de WordPress (UID 33) lea los archivos
      chown -R 33:33 /repo &&
      chmod -R 755 /repo
      "

volumes:
  db_data:
  wp_data:

networks:
  wp_net:
